<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险哨兵 // RISK SENTINEL - 带历史记录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(20, 20, 30, 0.7);
            --accent-cyan: #00f5d4;
            --accent-pink: #ff006e;
            --accent-yellow: #fee440;
            --accent-red: #ef233c;
            --text-primary: #e0e0e0;
            --text-secondary: #8888a0;
            --grid-line: rgba(0, 245, 212, 0.1);
            --border-glow: rgba(0, 245, 212, 0.3);
            --sidebar-width: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 布局容器 */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-glow);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .sidebar-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        .sidebar-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 历史记录列表 */
        .history-list {
            padding: 15px;
        }

        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .history-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .history-item:hover {
            transform: translateX(5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.2);
        }

        .history-item:hover::before {
            opacity: 1;
        }

        .history-item.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 245, 212, 0.1);
        }

        .history-item.active::before {
            opacity: 1;
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .history-score {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .history-score.high { color: var(--accent-red); }
        .history-score.medium { color: var(--accent-yellow); }
        .history-score.low { color: #00c853; }

        .history-summary {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .history-empty-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* 刷新按钮 */
        .refresh-history-btn {
            width: calc(100% - 30px);
            margin: 0 15px 15px;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--accent-cyan);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 6px;
        }

        .refresh-history-btn:hover {
            background: rgba(0, 245, 212, 0.1);
            border-color: var(--accent-cyan);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--accent-cyan);
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
        }

        /* 原有样式保持不变... */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 40px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: var(--bg-primary);
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
        }

        .brand-text h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-text p {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* 详情弹窗 */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .detail-modal.show {
            display: flex;
        }

        .detail-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-glow);
        }

        .detail-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* 原有仪表盘样式... */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 245, 212, 0.15);
        }

        .metric-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .metric-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .metric-value.risk-low { color: #00c853; }
        .metric-value.risk-medium { color: var(--accent-yellow); }
        .metric-value.risk-high { color: var(--accent-red); }
        .metric-value.risk-critical { color: var(--accent-pink); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 面板样式 */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .panel-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-cyan);
        }

        /* 新闻列表样式 */
        .news-list {
            padding: 20px;
        }

        .news-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }

        .news-content {
            flex: 1;
            margin-right: 20px;
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .news-source {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
        }

        .news-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .news-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .sentiment-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .sentiment-tag.positive {
            background: rgba(0, 200, 83, 0.2);
            color: #00c853;
        }

        .sentiment-tag.negative {
            background: rgba(239, 35, 60, 0.2);
            color: var(--accent-red);
        }

        .sentiment-tag.neutral {
            background: rgba(136, 136, 160, 0.2);
            color: var(--text-secondary);
        }

        .risk-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 0, 110, 0.2);
            color: var(--accent-pink);
        }

        .news-risk-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            min-width: 80px;
        }

        .risk-score-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .risk-score-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .risk-score-value.low { color: #00c853; }
        .risk-score-value.medium { color: var(--accent-yellow); }
        .risk-score-value.high { color: var(--accent-red); }
        .risk-score-value.critical { color: var(--accent-pink); }

        /* 详情弹窗中的文章列表 */
        .detail-news-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .detail-news-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-glow);
        }

        .detail-news-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- 侧边栏：历史记录 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">📋 历史记录</div>
            <div class="sidebar-subtitle">最近 5 次分析</div>
        </div>

        <button class="refresh-history-btn" onclick="loadHistory()">
            🔄 刷新历史
        </button>

        <div class="history-list" id="historyList">
            <div class="history-empty">
                <div class="history-empty-icon">📭</div>
                <div>暂无历史记录</div>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <!-- 头部 -->
            <header>
                <div class="brand">
                    <div class="logo">RS</div>
                    <div class="brand-text">
                        <h1>RISK SENTINEL</h1>
                        <p>IF椰子水 舆情监控与风险分析系统</p>
                    </div>
                </div>
                <button class="refresh-history-btn" onclick="startNewAnalysis()" style="width: auto; margin: 0;">
                    🔍 开始新分析
                </button>
            </header>

            <!-- 原有仪表盘内容 -->
            <div id="dashboardContent">
                <!-- 动态加载 -->
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <div class="detail-header">
                <div class="detail-title">📊 历史分析详情</div>
                <button class="close-btn" onclick="closeDetail()">关闭</button>
            </div>
            <div id="detailBody">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>

    <script>
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/history?limit=5');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    renderHistoryList(result.data);
                } else {
                    document.getElementById('historyList').innerHTML = `
                        <div class="history-empty">
                            <div class="history-empty-icon">📭</div>
                            <div>暂无历史记录</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }

        // 渲染历史记录列表
        function renderHistoryList(records) {
            const listHtml = records.map(record => {
                const scoreClass = record.risk_score >= 80 ? 'high' : record.risk_score >= 60 ? 'medium' : 'low';
                const timeStr = new Date(record.timestamp).toLocaleString('zh-CN');

                return `
                    <div class="history-item" onclick="viewDetail('${record.id}')">
                        <div class="history-time">${timeStr}</div>
                        <div class="history-score ${scoreClass}">${record.risk_score}分</div>
                        <div class="history-summary">${record.summary}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('historyList').innerHTML = listHtml;
        }

        // 查看详情
        async function viewDetail(recordId) {
            try {
                const response = await fetch(`/api/history/${recordId}`);
                const result = await response.json();

                if (result.success) {
                    renderDetail(result.data);
                    document.getElementById('detailModal').classList.add('show');
                }
            } catch (error) {
                console.error('加载详情失败:', error);
            }
        }

        // 渲染详情
        function renderDetail(data) {
            const sentimentDist = data.sentiment_distribution || {};
            const total = data.total_articles || 0;

            document.getElementById('detailBody').innerHTML = `
                <div class="dashboard" style="margin-bottom: 20px;">
                    <div class="metric-card">
                        <div class="metric-label">分析文章数</div>
                        <div class="metric-value">${total}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">风险文章数</div>
                        <div class="metric-value">${data.risky_articles}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">风险评分</div>
                        <div class="metric-value">${data.risk_score}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">风险等级</div>
                        <div class="metric-value">${data.risk_level}</div>
                    </div>
                </div>
                <div style="background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px; color: var(--accent-cyan);">情感分布</h3>
                    <p>正面: ${sentimentDist['正面'] || 0} |
                       负面: ${sentimentDist['负面'] || 0} |
                       中性: ${sentimentDist['中性'] || 0}</p>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">📰 文章列表</span>
                    </div>
                    <div class="detail-news-list">
                        ${renderNewsList(data.analyzed_articles)}
                    </div>
                </div>
            `;
        }

        // 关闭详情
        function closeDetail() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 开始新分析
        function startNewAnalysis() {
            // 跳转到主页或刷新数据
            window.location.href = '/';
        }

        // 切换侧边栏（移动端）
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // 页面加载时获取历史记录和分析数据
        window.onload = function() {
            loadHistory();
            loadAnalysisData();
        };

        // 加载分析数据
        async function loadAnalysisData() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = `
                <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
                    <div style="width: 40px; height: 40px; border: 4px solid rgba(0,245,212,0.2); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                    <p>正在分析数据...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/analyze');
                const result = await response.json();

                if (result.success) {
                    renderDashboard(result.data);
                    // 刷新历史记录
                    setTimeout(loadHistory, 1000);
                } else {
                    dashboard.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: var(--accent-red);">
                            <p>❌ 分析失败: ${result.error}</p>
                            <button class="refresh-history-btn" onclick="loadAnalysisData()" style="margin-top: 20px;">重试</button>
                        </div>
                    `;
                }
            } catch (error) {
                dashboard.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--accent-red);">
                        <p>❌ 网络错误: ${error.message}</p>
                        <button class="refresh-history-btn" onclick="loadAnalysisData()" style="margin-top: 20px;">重试</button>
                    </div>
                `;
            }
        }

        // 渲染仪表盘
        function renderDashboard(data) {
            const riskClass = getRiskClass(data.overall_risk_level);
            const negativeRatio = calculateNegativeRatio(data.sentiment_distribution);

            document.getElementById('dashboardContent').innerHTML = `
                <!-- 指标卡片 -->
                <div class="dashboard">
                    <div class="metric-card">
                        <div class="metric-label">分析文章总数</div>
                        <div class="metric-value">${data.total_articles}</div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 10px;">
                            发现 ${data.risky_articles} 条风险内容
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">综合风险评分</div>
                        <div class="metric-value ${riskClass}">${data.average_risk_score}</div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 10px;">
                            满分 100 分
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">风险等级</div>
                        <div class="metric-value ${riskClass}">${data.overall_risk_level}</div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 10px;">
                            基于NLP分析
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">负面舆情占比</div>
                        <div class="metric-value" style="color: ${negativeRatio > 40 ? 'var(--accent-red)' : 'var(--accent-yellow)'};">${negativeRatio}%</div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 10px;">
                            情感分析统计
                        </div>
                    </div>
                </div>

                <!-- 预警和风险 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">⚠️ 风险预警</span>
                            <span style="color: var(--accent-red); font-weight: 600;">${data.warnings ? data.warnings.length : 0} 条</span>
                        </div>
                        <div>
                            ${renderWarnings(data.warnings)}
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">📊 风险类型分布</span>
                        </div>
                        <div style="padding: 20px;">
                            ${renderRiskTypes(data.risk_type_summary)}
                        </div>
                    </div>
                </div>

                <!-- 情感分布 -->
                <div class="panel" style="margin-bottom: 30px;">
                    <div class="panel-header">
                        <span class="panel-title">📈 情感分布</span>
                    </div>
                    <div style="padding: 20px;">
                        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 200px;">
                                <div style="margin-bottom: 15px;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                        <span>正面</span>
                                        <span style="color: #00c853;">${data.sentiment_distribution['正面'] || 0}</span>
                                    </div>
                                    <div style="height: 8px; background: rgba(0,200,83,0.2); border-radius: 4px; overflow: hidden;">
                                        <div style="height: 100%; width: ${(data.sentiment_distribution['正面'] || 0) / data.total_articles * 100}%; background: #00c853; border-radius: 4px;"></div>
                                    </div>
                                </div>
                                <div style="margin-bottom: 15px;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                        <span>负面</span>
                                        <span style="color: var(--accent-red);">${data.sentiment_distribution['负面'] || 0}</span>
                                    </div>
                                    <div style="height: 8px; background: rgba(239,35,60,0.2); border-radius: 4px; overflow: hidden;">
                                        <div style="height: 100%; width: ${(data.sentiment_distribution['负面'] || 0) / data.total_articles * 100}%; background: var(--accent-red); border-radius: 4px;"></div>
                                    </div>
                                </div>
                                <div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                        <span>中性</span>
                                        <span style="color: var(--text-secondary);">${data.sentiment_distribution['中性'] || 0}</span>
                                    </div>
                                    <div style="height: 8px; background: rgba(136,136,160,0.2); border-radius: 4px; overflow: hidden;">
                                        <div style="height: 100%; width: ${(data.sentiment_distribution['中性'] || 0) / data.total_articles * 100}%; background: var(--text-secondary); border-radius: 4px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 新闻列表 -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">📰 监测到的文章</span>
                        <span style="color: var(--text-secondary); font-size: 0.85rem;">共 ${data.total_articles || 0} 条</span>
                    </div>
                    <div class="news-list">
                        ${renderNewsList(data.analyzed_articles)}
                    </div>
                </div>
            `;
        }

        // 渲染预警
        function renderWarnings(warnings) {
            if (!warnings || warnings.length === 0) {
                return '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">暂无预警</div>';
            }

            const levelMap = {
                '严重': { color: 'var(--accent-pink)', bg: 'rgba(255,0,110,0.1)' },
                '高': { color: 'var(--accent-red)', bg: 'rgba(239,35,60,0.1)' },
                '中': { color: 'var(--accent-yellow)', bg: 'rgba(254,228,64,0.1)' }
            };

            return warnings.slice(0, 5).map(w => {
                const level = levelMap[w.level] || { color: 'var(--accent-yellow)', bg: 'rgba(254,228,64,0.1)' };
                return `
                    <div style="padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid ${level.color}; background: ${level.bg};">
                        <div style="font-weight: 600; color: ${level.color}; margin-bottom: 5px;">[${w.level}]</div>
                        <div>${w.message}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染风险类型
        function renderRiskTypes(riskTypes) {
            if (!riskTypes || Object.keys(riskTypes).length === 0) {
                return '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">未发现明显风险</div>';
            }

            const maxCount = Math.max(...Object.values(riskTypes).map(r => r.count));

            return Object.entries(riskTypes).map(([type, data]) => {
                const percentage = (data.count / maxCount) * 100;
                return `
                    <div style="display: flex; align-items: center; margin-bottom: 15px;">
                        <div style="width: 100px; font-size: 0.9rem;">${type}</div>
                        <div style="flex: 1; height: 30px; background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; margin: 0 15px;">
                            <div style="height: 100%; width: ${percentage}%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink)); border-radius: 15px; transition: width 0.5s;"></div>
                        </div>
                        <div style="width: 50px; text-align: right; font-weight: 600; color: var(--accent-cyan);">${data.count}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染新闻列表
        function renderNewsList(analyzedArticles) {
            if (!analyzedArticles || analyzedArticles.length === 0) {
                return '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无文章数据</div>';
            }

            // 只显示前10条，按风险分数排序
            const sortedArticles = [...analyzedArticles]
                .sort((a, b) => (b.score?.total_score || 0) - (a.score?.total_score || 0))
                .slice(0, 10);

            return sortedArticles.map(item => {
                const article = item.article || {};
                const sentiment = item.sentiment || {};
                const score = item.score?.total_score || 0;

                const sentimentClass = sentiment.sentiment_label === '正面' ? 'positive' :
                                      sentiment.sentiment_label === '负面' ? 'negative' : 'neutral';
                const sentimentText = sentiment.sentiment_label || '中性';
                const scoreClass = score >= 80 ? 'critical' : score >= 60 ? 'high' : score >= 40 ? 'medium' : 'low';

                // 构建风险标签
                const riskTags = (item.risks || []).map(r =>
                    `<span class="risk-tag">${r.risk_type}</span>`
                ).join('');

                return `
                    <div class="news-item">
                        <div class="news-content">
                            <div class="news-title">${article.title || '无标题'}</div>
                            <div class="news-tags">
                                <span class="sentiment-tag ${sentimentClass}">${sentimentText}</span>
                                ${riskTags}
                            </div>
                        </div>
                        <div class="news-risk-score">
                            <span class="risk-score-label">风险分</span>
                            <span class="risk-score-value ${scoreClass}">${score}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getRiskClass(level) {
            switch(level) {
                case '低风险': return 'risk-low';
                case '中风险': return 'risk-medium';
                case '高风险': return 'risk-high';
                case '严重风险': return 'risk-critical';
                default: return '';
            }
        }

        function calculateNegativeRatio(distribution) {
            const total = (distribution['正面'] || 0) + (distribution['负面'] || 0) + (distribution['中性'] || 0);
            if (total === 0) return 0;
            return Math.round(((distribution['负面'] || 0) / total) * 100);
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetail();
            }
        });
    </script>
</body>
</html>
