<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险哨兵 // RISK SENTINEL - 带历史记录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(20, 20, 30, 0.7);
            --accent-cyan: #00f5d4;
            --accent-pink: #ff006e;
            --accent-yellow: #fee440;
            --accent-red: #ef233c;
            --text-primary: #e0e0e0;
            --text-secondary: #8888a0;
            --grid-line: rgba(0, 245, 212, 0.1);
            --border-glow: rgba(0, 245, 212, 0.3);
            --sidebar-width: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 布局容器 */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-glow);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .sidebar-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        .sidebar-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 历史记录列表 */
        .history-list {
            padding: 15px;
        }

        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .history-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .history-item:hover {
            transform: translateX(5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.2);
        }

        .history-item:hover::before {
            opacity: 1;
        }

        .history-item.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 245, 212, 0.1);
        }

        .history-item.active::before {
            opacity: 1;
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .history-score {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .history-score.high { color: var(--accent-red); }
        .history-score.medium { color: var(--accent-yellow); }
        .history-score.low { color: #00c853; }

        .history-summary {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .history-empty-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* 刷新按钮 */
        .refresh-history-btn {
            width: calc(100% - 30px);
            margin: 0 15px 15px;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--accent-cyan);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 6px;
        }

        .refresh-history-btn:hover {
            background: rgba(0, 245, 212, 0.1);
            border-color: var(--accent-cyan);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--accent-cyan);
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
        }

        /* 原有样式保持不变... */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 40px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: var(--bg-primary);
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
        }

        .brand-text h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-text p {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* 详情弹窗 */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .detail-modal.show {
            display: flex;
        }

        .detail-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-glow);
        }

        .detail-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* 原有仪表盘样式... */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 245, 212, 0.15);
        }

        .metric-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .metric-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .metric-value.risk-low { color: #00c853; }
        .metric-value.risk-medium { color: var(--accent-yellow); }
        .metric-value.risk-high { color: var(--accent-red); }
        .metric-value.risk-critical { color: var(--accent-pink); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 面板样式 */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .panel-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-cyan);
        }

        /* 新闻列表样式 */
        .news-list {
            padding: 20px;
        }

        .news-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }

        .news-content {
            flex: 1;
            margin-right: 20px;
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .news-source {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
        }

        .news-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .news-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .sentiment-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .sentiment-tag.positive {
            background: rgba(0, 200, 83, 0.2);
            color: #00c853;
        }

        .sentiment-tag.negative {
            background: rgba(239, 35, 60, 0.2);
            color: var(--accent-red);
        }

        .sentiment-tag.neutral {
            background: rgba(136, 136, 160, 0.2);
            color: var(--text-secondary);
        }

        .risk-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 0, 110, 0.2);
            color: var(--accent-pink);
        }

        .news-risk-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            min-width: 80px;
        }

        .risk-score-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .risk-score-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .risk-score-value.low { color: #00c853; }
        .risk-score-value.medium { color: var(--accent-yellow); }
        .risk-score-value.high { color: var(--accent-red); }
        .risk-score-value.critical { color: var(--accent-pink); }

        /* 详情弹窗中的文章列表 */
        .detail-news-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .detail-news-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-glow);
        }

        .detail-news-item:last-child {
            border-bottom: none;
        }

        /* 实时预警栏样式 */
        .alert-banner {
            background: linear-gradient(135deg, rgba(239, 35, 60, 0.9), rgba(255, 0, 110, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            animation: alertPulse 2s infinite;
            box-shadow: 0 0 30px rgba(239, 35, 60, 0.4);
        }

        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 35, 60, 0.4); }
            50% { box-shadow: 0 0 40px rgba(239, 35, 60, 0.8); }
        }

        .alert-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .alert-icon {
            font-size: 1.5rem;
            animation: alertShake 0.5s infinite alternate;
        }

        @keyframes alertShake {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        .alert-close {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .alert-close:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* 风险热图样式 */
        .risk-heatmap {
            display: grid;
            grid-template-columns: 80px repeat(3, 1fr);
            gap: 4px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .heatmap-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .heatmap-cell:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .heatmap-cell .count {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .heatmap-cell .label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* 风险热图颜色 */
        .risk-low-low { background: rgba(0, 200, 83, 0.3); color: #00c853; border: 1px solid rgba(0, 200, 83, 0.5); }
        .risk-low-med { background: rgba(0, 200, 83, 0.15); color: #00c853; border: 1px solid rgba(0, 200, 83, 0.3); }
        .risk-low-high { background: rgba(254, 228, 64, 0.15); color: var(--accent-yellow); border: 1px solid rgba(254, 228, 64, 0.3); }
        .risk-med-low { background: rgba(0, 200, 83, 0.15); color: #00c853; border: 1px solid rgba(0, 200, 83, 0.3); }
        .risk-med-med { background: rgba(254, 228, 64, 0.3); color: var(--accent-yellow); border: 1px solid rgba(254, 228, 64, 0.5); }
        .risk-med-high { background: rgba(239, 35, 60, 0.3); color: var(--accent-red); border: 1px solid rgba(239, 35, 60, 0.5); }
        .risk-high-low { background: rgba(254, 228, 64, 0.15); color: var(--accent-yellow); border: 1px solid rgba(254, 228, 64, 0.3); }
        .risk-high-med { background: rgba(239, 35, 60, 0.3); color: var(--accent-red); border: 1px solid rgba(239, 35, 60, 0.5); }
        .risk-high-high { background: rgba(255, 0, 110, 0.4); color: var(--accent-pink); border: 1px solid rgba(255, 0, 110, 0.6); }

        /* 定量分析面板 */
        .quant-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .quant-metric {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .quant-metric-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 5px;
        }

        .quant-metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 工作流信息 */
        .workflow-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            margin-bottom: 20px;
        }

        .workflow-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- 侧边栏：历史记录 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">📋 历史记录</div>
            <div class="sidebar-subtitle">最近 5 次分析</div>
        </div>

        <button class="refresh-history-btn" onclick="loadHistory()">
            🔄 刷新历史
        </button>

        <div class="history-list" id="historyList">
            <div class="history-empty">
                <div class="history-empty-icon">📭</div>
                <div>暂无历史记录</div>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <!-- 实时预警栏 -->
            <div id="alertBanner" class="alert-banner" style="display: none;">
                <div class="alert-content">
                    <span class="alert-icon">⚠️</span>
                    <span id="alertText">实时风险预警加载中...</span>
                    <button class="alert-close" onclick="dismissAlert()">×</button>
                </div>
            </div>

            <!-- 头部 -->
            <header>
                <div class="brand">
                    <div class="logo">RS</div>
                    <div class="brand-text">
                        <h1>RISK SENTINEL</h1>
                        <p>IF椰子水 舆情监控与风险分析系统</p>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="refresh-history-btn" onclick="runDelphiAnalysis()" style="width: auto; margin: 0; background: linear-gradient(135deg, rgba(255,0,110,0.2), rgba(255,0,110,0.1)); border-color: var(--accent-pink); color: var(--accent-pink);">
                        🎯 德尔菲分析
                    </button>
                    <button class="refresh-history-btn" onclick="startNewAnalysis()" style="width: auto; margin: 0;">
                        🔍 开始新分析
                    </button>
                </div>
            </header>

            <!-- 原有仪表盘内容 -->
            <div id="dashboardContent">
                <!-- 动态加载 -->
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <div class="detail-header">
                <div class="detail-title">📊 历史分析详情</div>
                <button class="close-btn" onclick="closeDetail()">关闭</button>
            </div>
            <div id="detailBody">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>

    <!-- 德尔菲分析弹窗 -->
    <div class="detail-modal" id="delphiModal">
        <div class="detail-content" style="max-width: 1000px;">
            <div class="detail-header">
                <div class="detail-title">🎯 德尔菲风险分析报告</div>
                <button class="close-btn" onclick="closeDelphiReport()">关闭</button>
            </div>
            <div id="delphiBody">
                <!-- 德尔菲分析内容 -->
            </div>
        </div>
    </div>

    <script>
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/history?limit=5');
                const result = await response.json();

                if (result.success && result.data.length > 0) {

        // 渲染预警
        function renderWarnings(warnings) {
            if (!warnings || warnings.length === 0) {
                return '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">暂无预警</div>';
            }

            const levelMap = {
                '严重': { color: 'var(--accent-pink)', bg: 'rgba(255,0,110,0.1)' },
                '高': { color: 'var(--accent-red)', bg: 'rgba(239,35,60,0.1)' },
                '中': { color: 'var(--accent-yellow)', bg: 'rgba(254,228,64,0.1)' }
            };

            return warnings.slice(0, 5).map(w => {
                const level = levelMap[w.level] || { color: 'var(--accent-yellow)', bg: 'rgba(254,228,64,0.1)' };
                return `
                    <div style="padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid ${level.color}; background: ${level.bg};">
                        <div style="font-weight: 600; color: ${level.color}; margin-bottom: 5px;">[${w.level}]</div>
                        <div>${w.message}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染风险类型
        function renderRiskTypes(riskTypes) {
            if (!riskTypes || Object.keys(riskTypes).length === 0) {
                return '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">未发现明显风险</div>';
            }

            const maxCount = Math.max(...Object.values(riskTypes).map(r => r.count));

            return Object.entries(riskTypes).map(([type, data]) => {
                const percentage = (data.count / maxCount) * 100;
                return `
                    <div style="display: flex; align-items: center; margin-bottom: 15px;">
                        <div style="width: 100px; font-size: 0.9rem;">${type}</div>
                        <div style="flex: 1; height: 30px; background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; margin: 0 15px;">
                            <div style="height: 100%; width: ${percentage}%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink)); border-radius: 15px; transition: width 0.5s;"></div>
                        </div>
                        <div style="width: 50px; text-align: right; font-weight: 600; color: var(--accent-cyan);">${data.count}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染新闻列表
        function renderNewsList(analyzedArticles) {
            if (!analyzedArticles || analyzedArticles.length === 0) {
                return '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无文章数据</div>';
            }

            // 只显示前10条，按风险分数排序
            const sortedArticles = [...analyzedArticles]
                .sort((a, b) => (b.score?.total_score || 0) - (a.score?.total_score || 0))
                .slice(0, 10);

            return sortedArticles.map(item => {
                const article = item.article || {};
                const sentiment = item.sentiment || {};
                const score = item.score?.total_score || 0;

                const sentimentClass = sentiment.sentiment_label === '正面' ? 'positive' :
                                      sentiment.sentiment_label === '负面' ? 'negative' : 'neutral';
                const sentimentText = sentiment.sentiment_label || '中性';
                const scoreClass = score >= 80 ? 'critical' : score >= 60 ? 'high' : score >= 40 ? 'medium' : 'low';

                // 构建风险标签
                const riskTags = (item.risks || []).map(r =>
                    `<span class="risk-tag">${r.risk_type}</span>`
                ).join('');

                return `
                    <div class="news-item">
                        <div class="news-content">
                            <div class="news-title">${article.title || '无标题'}</div>
                            <div class="news-tags">
                                <span class="sentiment-tag ${sentimentClass}">${sentimentText}</span>
                                ${riskTags}
                            </div>
                        </div>
                        <div class="news-risk-score">
                            <span class="risk-score-label">风险分</span>
                            <span class="risk-score-value ${scoreClass}">${score}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getRiskClass(level) {
            switch(level) {
                case '低风险': return 'risk-low';
                case '中风险': return 'risk-medium';
                case '高风险': return 'risk-high';
                case '严重风险': return 'risk-critical';
                default: return '';
            }
        }

        function calculateNegativeRatio(distribution) {
            const total = (distribution['正面'] || 0) + (distribution['负面'] || 0) + (distribution['中性'] || 0);
            if (total === 0) return 0;
            return Math.round(((distribution['负面'] || 0) / total) * 100);
        }

        // 渲染风险热图
        function renderRiskHeatmap(riskDist, articles) {
            // 计算每个格子的文章数
            // 基于probability和risk_score计算位置
            const grid = {
                'high-high': 0, 'high-med': 0, 'high-low': 0,
                'med-high': 0, 'med-med': 0, 'med-low': 0,
                'low-high': 0, 'low-med': 0, 'low-low': 0
            };

            if (articles) {
                articles.forEach(item => {
                    const prob = item.probability || 0;
                    const riskScore = item.risk_score || 0;

                    // 概率分类
                    const probLevel = prob > 0.6 ? 'high' : prob > 0.3 ? 'med' : 'low';
                    // 影响度分类（基于risk_score）
                    const impactLevel = riskScore > 0.4 ? 'high' : riskScore > 0.2 ? 'med' : 'low';

                    const key = `${impactLevel}-${probLevel}`;
                    if (grid[key] !== undefined) {
                        grid[key]++;
                    }
                });
            }

            return `
                <div class="risk-heatmap">
                    <!-- 顶部标签 -->
                    <div class="heatmap-label"></div>
                    <div class="heatmap-label">高概率</div>
                    <div class="heatmap-label">中概率</div>
                    <div class="heatmap-label">低概率</div>

                    <!-- 高影响度行 -->
                    <div class="heatmap-label">高影响</div>
                    <div class="heatmap-cell risk-high-high" title="高影响 × 高概率">
                        <span class="count">${grid['high-high']}</span>
                        <span class="label">高风险</span>
                    </div>
                    <div class="heatmap-cell risk-high-med" title="高影响 × 中概率">
                        <span class="count">${grid['high-med']}</span>
                        <span class="label">中高风险</span>
                    </div>
                    <div class="heatmap-cell risk-high-low" title="高影响 × 低概率">
                        <span class="count">${grid['high-low']}</span>
                        <span class="label">中等风险</span>
                    </div>

                    <!-- 中影响度行 -->
                    <div class="heatmap-label">中影响</div>
                    <div class="heatmap-cell risk-med-high" title="中影响 × 高概率">
                        <span class="count">${grid['med-high']}</span>
                        <span class="label">中高风险</span>
                    </div>
                    <div class="heatmap-cell risk-med-med" title="中影响 × 中概率">
                        <span class="count">${grid['med-med']}</span>
                        <span class="label">中风险</span>
                    </div>
                    <div class="heatmap-cell risk-med-low" title="中影响 × 低概率">
                        <span class="count">${grid['med-low']}</span>
                        <span class="label">低风险</span>
                    </div>

                    <!-- 低影响度行 -->
                    <div class="heatmap-label">低影响</div>
                    <div class="heatmap-cell risk-low-high" title="低影响 × 高概率">
                        <span class="count">${grid['low-high']}</span>
                        <span class="label">中等风险</span>
                    </div>
                    <div class="heatmap-cell risk-low-med" title="低影响 × 中概率">
                        <span class="count">${grid['low-med']}</span>
                        <span class="label">低风险</span>
                    </div>
                    <div class="heatmap-cell risk-low-low" title="低影响 × 低概率">
                        <span class="count">${grid['low-low']}</span>
                        <span class="label">极低风险</span>
                    </div>
                </div>
            `;
        }

        // 渲染定量分析
        function renderQuantitativeAnalysis(quant) {
            const el = quant.EL || {};
            const var_ = quant.VaR || {};
            const stress = quant.stress_test || {};
            const scope = quant.analysis_scope || {};

            return `
                <div class="quant-metrics">
                    <div class="quant-metric">
                        <div class="quant-metric-value">${el.EL !== undefined ? el.EL.toFixed(2) : '--'}</div>
                        <div class="quant-metric-label">预期损失 (EL)</div>
                    </div>
                    <div class="quant-metric">
                        <div class="quant-metric-value">${el.PD !== undefined ? (el.PD * 100).toFixed(1) + '%' : '--'}</div>
                        <div class="quant-metric-label">违约概率 (PD)</div>
                    </div>
                    <div class="quant-metric">
                        <div class="quant-metric-value">${el.LGD !== undefined ? (el.LGD * 100).toFixed(1) + '%' : '--'}</div>
                        <div class="quant-metric-label">损失程度 (LGD)</div>
                    </div>
                    <div class="quant-metric">
                        <div class="quant-metric-value">${var_.VaR !== undefined ? var_.VaR.toFixed(2) : '--'}</div>
                        <div class="quant-metric-label">VaR (95%)</div>
                    </div>
                </div>
                ${stress.change_percent !== undefined ? `
                <div style="padding: 15px 20px; border-top: 1px solid var(--border-glow);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: var(--text-secondary); font-size: 0.85rem;">压力测试结果</span>
                        <span style="color: ${stress.change_percent > 50 ? 'var(--accent-red)' : 'var(--accent-yellow)'}; font-weight: 600;">
                            EL ↑${stress.change_percent.toFixed(1)}%
                        </span>
                    </div>
                    <div style="height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden;">
                        <div style="height: 100%; width: ${Math.min(stress.change_percent, 100)}%; background: ${stress.change_percent > 50 ? 'var(--accent-red)' : 'var(--accent-yellow)'}; border-radius: 3px;"></div>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.8rem; color: var(--text-secondary);">
                        ${stress.message || ''}
                    </p>
                </div>
                ` : ''}
            `;
        }

        // 加载电商监控数据

                            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                                '<strong>[' + s.id + '] ' + s.signal + '</strong>' +
                                '<span style="padding:2px 8px;border-radius:10px;font-size:0.65rem;' + (s.severity === 'critical' ? 'background:#ef233c;color:#fff;' : s.severity === 'high' ? 'background:rgba(239,35,60,0.4);color:#ef233c;' : 'background:rgba(254,228,64,0.3);color:#fee440;') + '">' + s.severity.toUpperCase() + '</span>' +
                            '</div>' +
                            '<div style="margin-top:4px;color:var(--text-secondary);">' + s.detail + '</div>' +
                            '<div style="margin-top:4px;font-size:0.7rem;color:var(--accent-cyan);">→ ' + s.implication + '</div>' +
                        '</div>'
                    ).join('') : '<div style="text-align:center;padding:20px;color:var(--text-secondary);">✅ 未检测到财务反常信号</div>') +
                '</div>' +

                // === 第四行: 综合评分+宏观敏感性 ===
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">' +
                    '<div style="background:rgba(0,0,0,0.2);padding:12px;border-radius:8px;">' +
                        '<div style="font-size:0.85rem;color:var(--accent-cyan);margin-bottom:10px;">🏦 财务风险综合评分</div>' +
                        '<div style="text-align:center;margin-bottom:10px;">' +
                            '<div style="font-size:3rem;font-weight:700;color:' + (riskScore.total_score >= 70 ? '#ef233c' : riskScore.total_score >= 50 ? '#fee440' : '#00c853') + ';">' + riskScore.total_score + '</div>' +
                            '<div style="font-size:0.8rem;color:var(--text-secondary);">/100 (' + riskScore.risk_level.toUpperCase() + ' | ' + riskScore.anomaly_count + '反常信号)</div>' +
                        '</div>' +
                        (riskScore.factors ? Object.entries(riskScore.factors).map(([k, v]) =>
                            '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:0.75rem;">' +
                                '<span>' + k + '</span>' +
                                '<div style="width:100px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin:0 8px;">' +
                                    '<div style="height:100%;width:' + Math.min(v.score / 25 * 100, 100) + '%;background:' + (v.level === 'critical' ? '#ef233c' : v.level === 'warning' ? '#fee440' : '#00c853') + ';border-radius:2px;"></div>' +
                                '</div>' +
                                '<span style="width:30px;text-align:right;color:' + (v.level === 'critical' ? '#ef233c' : v.level === 'warning' ? '#fee440' : '#00c853') + ';">' + v.score + '</span>' +
                            '</div>'
                        ).join('') : '') +
                    '</div>' +
                    '<div style="background:rgba(0,0,0,0.2);padding:12px;border-radius:8px;">' +
                        '<div style="font-size:0.85rem;color:var(--accent-cyan);margin-bottom:10px;">🌍 宏观敏感性分析 (PDF Module 2)</div>' +
                        (macro ? Object.entries(macro).map(([k, v]) =>
                            '<div style="padding:4px 0;font-size:0.75rem;">' +
                                '<div style="display:flex;justify-content:space-between;">' +
                                    '<span>' + (k === 'currency_risk' ? '汇率风险' : k === 'commodity_risk' ? '大宗商品' : k === 'interest_rate_risk' ? '利率风险' : '中国消费') + '</span>' +
                                    '<span style="color:' + (v.severity === 'critical' ? '#ef233c' : v.severity === 'high' ? '#ff6b6b' : v.severity === 'medium' ? '#fee440' : '#00c853') + ';">' + v.severity.toUpperCase() + '</span>' +
                                '</div>' +
                                '<div style="color:var(--text-secondary);margin-top:2px;">' + (v.impact || v.detail || '').substring(0, 60) + '...</div>' +
                            '</div>'
                        ).join('') : '') +
                    '</div>' +
                '</div>' +

                '</div></div>';

            const target = document.getElementById('dashboardContent');
            target.insertAdjacentHTML('beforeend', html);
        }

        // 加载风险应对方案
        async function loadResponsePlan() {
            try {
                const resp = await fetch('/api/response/plan');
                const result = await resp.json();
                if (result.success) {
                    renderResponsePanel(result.data, result.signal_summary);
                }
            } catch (e) { console.error('Response plan load failed:', e); }
        }

        // 渲染风险应对面板
        function renderResponsePanel(data, summary) {
            const crisisLevel = data.crisis_assessment || {};
            const timeline = data.timeline || [];
            const actions = (data.prioritized_actions || []).slice(0, 6);
            const cost = data.cost_estimate || {};

            // 危机等级颜色
            const levelColors = {
                'red': { bg: 'rgba(239,35,60,0.2)', border: '#ef233c', text: '#ef233c', label: 'RED' },
                'orange': { bg: 'rgba(254,228,64,0.15)', border: '#fee440', text: '#fee440', label: 'ORANGE' },
                'yellow': { bg: 'rgba(254,228,64,0.1)', border: '#fee440', text: '#fee440', label: 'YELLOW' },
                'green': { bg: 'rgba(0,200,83,0.15)', border: '#00c853', text: '#00c853', label: 'GREEN' },
            };
            const lc = levelColors[crisisLevel.level] || levelColors['yellow'];

            const html = '<div class="panel" style="margin-bottom: 30px;">' +
                '<div class="panel-header">' +
                    '<span class="panel-title">🛡️ 风险应对方案 (Risk Response Engine v2.0)</span>' +
                    '<span style="padding:4px 12px;border-radius:12px;font-size:0.75rem;background:' + lc.bg + ';color:' + lc.text + ';border:1px solid ' + lc.border + ';">' + lc.label + ' (' + crisisLevel.score + '/100)</span>' +
                '</div>' +
                '<div style="padding:20px;">' +

                // 执行摘要
                '<div style="background:rgba(0,0,0,0.3);padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:0.85rem;line-height:1.6;white-space:pre-line;">' + (data.executive_summary || 'Loading...') + '</div>' +

                // 关键指标行
                '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;">' +
                    '<div style="background:' + lc.bg + ';padding:10px;border-radius:8px;text-align:center;"><div style="font-size:1.4rem;font-weight:700;color:' + lc.text + ';">' + crisisLevel.level.toUpperCase() + '</div><div style="font-size:0.7rem;">危机等级</div></div>' +
                    '<div style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;text-align:center;"><div style="font-size:1.4rem;font-weight:700;color:var(--accent-cyan);">' + actions.length + '</div><div style="font-size:0.7rem;">优先行动项</div></div>' +
                    '<div style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;text-align:center;"><div style="font-size:1.4rem;font-weight:700;color:var(--accent-yellow);">' + (cost.total_estimated_range || '--') + '</div><div style="font-size:0.7rem;">预计成本</div></div>' +
                    '<div style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;text-align:center;"><div style="font-size:1.4rem;font-weight:700;color:var(--accent-cyan);">' + timeline.length + '</div><div style="font-size:0.7rem;">执行阶段</div></div>' +
                '</div>' +

                // 优先行动项表格
                '<div style="margin-bottom:16px;"><div style="font-size:0.85rem;color:var(--accent-cyan);margin-bottom:10px;">优先行动项 (Prioritized Actions)</div>' +
                actions.map((a, i) =>
                    '<div style="display:flex;align-items:center;padding:10px 12px;margin-bottom:6px;background:rgba(0,0,0,0.2);border-radius:8px;border-left:3px solid ' + (i < 2 ? 'var(--accent-red)' : i < 4 ? 'var(--accent-yellow)' : 'var(--accent-cyan)') + ';">' +
                        '<span style="width:28px;height:28px;border-radius:50%;background:rgba(0,245,212,0.2);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--accent-cyan);margin-right:12px;flex-shrink:0;">' + (i+1) + '</span>' +
                        '<div style="flex:1;min-width:0;">' +
                            '<div style="font-size:0.8rem;font-weight:600;">[' + a.category + '] ' + a.action + '</div>' +
                            '<div style="font-size:0.7rem;color:var(--text-secondary);">' + a.detail.substring(0, 60) + '... | ' + a.timeline + '</div>' +
                        '</div>' +
                        '<span style="font-size:0.75rem;font-weight:600;padding:4px 8px;border-radius:6px;background:rgba(0,245,212,0.1);color:var(--accent-cyan);flex-shrink:0;">' + a.priority_score.toFixed(0) + '</span>' +
                    '</div>'
                ).join('') + '</div>' +

                // 执行时间线
                '<div style="border-top:1px solid var(--border-glow);padding-top:16px;"><div style="font-size:0.85rem;color:var(--accent-cyan);margin-bottom:10px;">执行时间线 (Execution Timeline)</div>' +
                timeline.map((phase, i) =>
                    '<div style="margin-bottom:12px;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;">' +
                        '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
                            '<span style="font-weight:700;font-size:0.85rem;">' + phase.phase + '</span>' +
                            '<span style="font-size:0.7rem;color:var(--text-secondary);">' + phase.deadline + '</span>' +
                        '</div>' +
                        phase.actions.map(a =>
                            '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:0.75rem;">' +
                                '<span>' + a.action + '</span>' +
                                '<span style="color:var(--text-secondary);">' + a.owner + '</span>' +
                            '</div>'
                        ).join('') +
                    '</div>'
                ).join('') + '</div>' +

                '</div></div>';

            const target = document.getElementById('dashboardContent');
            target.insertAdjacentHTML('beforeend', html);
        }

        // 关闭预警栏
        function dismissAlert() {
            document.getElementById('alertBanner').style.display = 'none';
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetail();
            }
        });

        document.getElementById('delphiModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDelphiReport();
            }
        });

        // ========== 德尔菲分析功能 ==========

        // 运行德尔菲分析
        async function runDelphiAnalysis() {
            const modal = document.getElementById('delphiModal');
            const body = document.getElementById('delphiBody');

            // 显示加载状态
            body.innerHTML = `
                <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
                    <div style="width: 50px; height: 50px; border: 4px solid rgba(255,0,110,0.2); border-top-color: var(--accent-pink); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                    <p>正在进行德尔菲3轮专家共识评估...</p>
                    <p style="font-size: 0.8rem; margin-top: 10px;">分析情感分数 → 专家独立打分 → 达成共识</p>
                </div>
            `;
            modal.classList.add('show');

            try {
                const response = await fetch('/api/delphi-analyze');
                const result = await response.json();

                if (result.success) {
                    renderDelphiReport(result.data);
                } else {
                    body.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: var(--accent-red);">
                            <p>❌ 分析失败: ${result.error}</p>
                            <button class="refresh-history-btn" onclick="runDelphiAnalysis()" style="margin-top: 20px;">重试</button>
                        </div>
                    `;
                }
            } catch (error) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--accent-red);">
                        <p>❌ 网络错误: ${error.message}</p>
                        <button class="refresh-history-btn" onclick="runDelphiAnalysis()" style="margin-top: 20px;">重试</button>
                    </div>
                `;
            }
        }

        // 渲染德尔菲分析报告
        function renderDelphiReport(data) {
            const body = document.getElementById('delphiBody');
            const summary = data.summary || {};
            const stats = data.consensus_statistics || {};
            const results = data.results || [];
            const methodology = data.methodology || {};

            body.innerHTML = `
                <!-- 报告头部信息 -->
                <div style="background: rgba(255,0,110,0.1); border: 1px solid var(--accent-pink); border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3 style="color: var(--accent-pink); font-family: 'Syncopate', sans-serif;">📋 ${data.title || '德尔菲风险分析报告'}</h3>
                        <span style="font-size: 0.8rem; color: var(--text-secondary);">${new Date(data.generated_at).toLocaleString('zh-CN')}</span>
                    </div>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">
                        <strong>方法论:</strong> ${methodology.name || 'Delphi Method'} - ${methodology.rounds || 3}轮专家共识评估
                    </p>
                </div>

                <!-- 统计概览 -->
                <div class="dashboard" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 25px;">
                    <div class="metric-card" style="border-color: var(--accent-red);">
                        <div class="metric-label">高风险条目</div>
                        <div class="metric-value" style="color: var(--accent-red);">${summary.high_risk_count || 0}</div>
                    </div>
                    <div class="metric-card" style="border-color: var(--accent-yellow);">
                        <div class="metric-label">中风险条目</div>
                        <div class="metric-value" style="color: var(--accent-yellow);">${summary.medium_risk_count || 0}</div>
                    </div>
                    <div class="metric-card" style="border-color: #00c853;">
                        <div class="metric-label">低风险条目</div>
                        <div class="metric-value" style="color: #00c853;">${summary.low_risk_count || 0}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">平均共识分</div>
                        <div class="metric-value">${stats.average_score || 0}</div>
                    </div>
                </div>

                <!-- 专家配置 -->
                <div class="panel" style="margin-bottom: 25px;">
                    <div class="panel-header">
                        <span class="panel-title" style="color: var(--accent-pink);">👥 专家评估团队</span>
                    </div>
                    <div style="padding: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                            ${(methodology.experts || []).map((expert, idx) => `
                                <div style="background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; border-left: 4px solid ${['var(--accent-cyan)', 'var(--accent-pink)', 'var(--accent-yellow)'][idx]}">
                                    <div style="font-weight: 600; margin-bottom: 5px;">${expert.name}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary);">关注: ${expert.focus}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- 评分规则 -->
                <div class="panel" style="margin-bottom: 25px;">
                    <div class="panel-header">
                        <span class="panel-title" style="color: var(--accent-pink);">📊 评分规则</span>
                    </div>
                    <div style="padding: 20px; font-size: 0.9rem; color: var(--text-secondary);">
                        <p style="margin-bottom: 10px;"><strong>基础分计算:</strong> ${methodology.scoring_rules?.base_score || ''}</p>
                        <p style="margin-bottom: 10px;"><strong>专家加权:</strong> ${methodology.scoring_rules?.weighting || ''}</p>
                        <p><strong>风险等级:</strong> ${methodology.scoring_rules?.final_level || ''}</p>
                    </div>
                </div>

                <!-- 分析结果表格 -->
                <div class="panel" style="margin-bottom: 25px;">
                    <div class="panel-header">
                        <span class="panel-title" style="color: var(--accent-pink);">📈 风险分析结果 (TOP ${results.length})</span>
                        <span style="color: var(--text-secondary); font-size: 0.8rem;">按情感负面程度排序</span>
                    </div>
                    <div style="padding: 20px; overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 2px solid var(--border-glow);">
                                    <th style="text-align: left; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">排名</th>
                                    <th style="text-align: left; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">新闻标题</th>
                                    <th style="text-align: center; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">情感分数</th>
                                    <th style="text-align: center; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">专家评分</th>
                                    <th style="text-align: center; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">IQR</th>
                                    <th style="text-align: center; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">共识分</th>
                                    <th style="text-align: center; padding: 12px; font-size: 0.85rem; color: var(--accent-cyan);">风险等级</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${results.map((r, idx) => `
                                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                        <td style="padding: 15px 12px; font-weight: 600;">${idx + 1}</td>
                                        <td style="padding: 15px 12px; max-width: 300px;" title="${r.title}">
                                            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${r.title}</div>
                                            ${r.keywords && r.keywords.length > 0 ? `
                                                <div style="margin-top: 5px;">
                                                    ${r.keywords.map(k => `<span style="font-size: 0.7rem; background: rgba(255,0,110,0.2); color: var(--accent-pink); padding: 2px 6px; border-radius: 4px; margin-right: 4px;">${k}</span>`).join('')}
                                                </div>
                                            ` : ''}
                                        </td>
                                        <td style="padding: 15px 12px; text-align: center; font-family: 'Space Mono', monospace;">${r.sentiment_score.toFixed(3)}</td>
                                        <td style="padding: 15px 12px; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.85rem;">[${r.expert_scores.join(', ')}]</td>
                                        <td style="padding: 15px 12px; text-align: center; font-family: 'Space Mono', monospace;">${r.iqr}</td>
                                        <td style="padding: 15px 12px; text-align: center; font-weight: 600; color: ${r.consensus_score >= 3 ? 'var(--accent-red)' : r.consensus_score >= 2 ? 'var(--accent-yellow)' : '#00c853'};">${r.consensus_score}</td>
                                        <td style="padding: 15px 12px; text-align: center;">
                                            <span style="padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; background: ${r.final_risk_level === '高' ? 'rgba(239,35,60,0.2)' : r.final_risk_level === '中' ? 'rgba(254,228,64,0.2)' : 'rgba(0,200,83,0.2)'}; color: ${r.final_risk_level === '高' ? 'var(--accent-red)' : r.final_risk_level === '中' ? 'var(--accent-yellow)' : '#00c853'};">
                                                ${r.final_risk_level}
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 共识统计 -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title" style="color: var(--accent-pink);">✅ 共识度统计</span>
                    </div>
                    <div style="padding: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                            <div style="text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                                <div style="font-size: 2rem; font-weight: 700; color: var(--accent-cyan); margin-bottom: 5px;">${stats.consensus_rate || '100%'}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">共识达成率</div>
                            </div>
                            <div style="text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                                <div style="font-size: 2rem; font-weight: 700; color: var(--accent-cyan); margin-bottom: 5px;">${stats.average_iqr || 0}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">平均IQR (分歧度)</div>
                            </div>
                            <div style="text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                                <div style="font-size: 2rem; font-weight: 700; color: var(--accent-cyan); margin-bottom: 5px;">${methodology.rounds || 3}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">评估轮次</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 关闭德尔菲报告
        function closeDelphiReport() {
            document.getElementById('delphiModal').classList.remove('show');
        }
    </script>
</body>
</html>
